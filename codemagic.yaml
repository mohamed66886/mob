workflows:
  mobile_android_release:
    name: Mobile Android Release (Expo)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: .

    environment:
      node: 20
      vars:
        EAS_NO_VCS: "1"
      groups:
        - mobile_env

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Create runtime env file
        script: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "EXPO_PUBLIC_API_URL is missing. Add it in Codemagic environment variables."
            exit 1
          fi
          printf "EXPO_PUBLIC_API_URL=%s\n" "$EXPO_PUBLIC_API_URL" > .env

      - name: Generate Android native project
        script: npx expo prebuild --platform android --non-interactive

      - name: Build Android APK (release)
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - mobile/android/app/build/outputs/**/*.apk

  mobile_ios_release:
    name: Mobile iOS Release (Expo)
    max_build_duration: 90
    instance_type: mac_mini_m2
    working_directory: mobile

    integrations:
      app_store_connect: codemagic_app_store_connect

    environment:
      node: 20
      xcode: latest
      cocoapods: default
      vars:
        EAS_NO_VCS: "1"
        BUNDLE_ID: com.meqr.code
        XCODE_WORKSPACE: ios/mobile.xcworkspace
        XCODE_SCHEME: mobile
      groups:
        - mobile_env
        - ios_signing

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - /Users/builder/Library/Developer/Xcode/DerivedData

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Create runtime env file
        script: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "EXPO_PUBLIC_API_URL is missing. Add it in Codemagic environment variables."
            exit 1
          fi
          printf "EXPO_PUBLIC_API_URL=%s\n" "$EXPO_PUBLIC_API_URL" > .env

      - name: Generate iOS native project
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Configure iOS signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
