workflows:
  mobile_android_release:
    name: Mobile Android Release (Expo)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: .

    environment:
      node: 20
      vars:
        EAS_NO_VCS: "1"
        EXPO_PUBLIC_API_URL: "https://attendqr.tech/api"
      groups:
        - mobile_env

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Create runtime env file
        script: |
          #!/usr/bin/env bash
          printf "EXPO_PUBLIC_API_URL=%s\n" "$EXPO_PUBLIC_API_URL" > .env

      - name: Generate Android native project
        script: npx expo prebuild --platform android --non-interactive

      - name: Build Android APK (release)
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk

  mobile_ios_release:
    name: Mobile iOS Release (Expo)
    max_build_duration: 90
    instance_type: mac_mini_m2
    working_directory: .

    integrations:
      app_store_connect: codemagic_app_store_connect

    environment:
      node: 20
      xcode: latest
      cocoapods: default
      # iOS Signing — uses files uploaded to Codemagic Code Signing Identities.
      # Certificate:         lucMX4sW  (meqrcode.p12)
      # Provisioning profile: meqr_appstore  (attendQr — App Store, com.meqr.code)
      ios_signing:
        certificates:
          - meqrcode
        provisioning_profiles:
          - meqr_appstore
      vars:
        EAS_NO_VCS: "1"
        EXPO_PUBLIC_API_URL: "https://attendqr.tech/api"
        BUNDLE_ID: com.meqr.code
        XCODE_WORKSPACE: ios/attendQr.xcworkspace
        XCODE_SCHEME: attendQr
      groups:
        - mobile_env

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/Library/Caches/CocoaPods
        - /Users/builder/Library/Developer/Xcode/DerivedData

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Create runtime env file
        script: |
          #!/usr/bin/env bash
          printf "EXPO_PUBLIC_API_URL=%s\n" "$EXPO_PUBLIC_API_URL" > .env

      - name: Generate iOS native project
        script: npx expo prebuild --platform ios --non-interactive

      - name: Patch iOS entitlements (remove aps-environment)
        script: |
          #!/usr/bin/env bash
          # expo-notifications adds aps-environment which requires a Push Notifications
          # provisioning profile. Remove it so CI build succeeds with a standard profile.
          # PERMANENT FIX: Enable Push Notifications on com.meqr.code in Apple Developer
          # Portal → Identifiers, then delete this step.
          ENTITLEMENTS="ios/attendQr/attendQr.entitlements"
          if [ -f "$ENTITLEMENTS" ]; then
            /usr/libexec/PlistBuddy -c "Delete :aps-environment" "$ENTITLEMENTS" 2>/dev/null || true
            echo "✅ Patched entitlements — removed aps-environment"
          else
            echo "⚠️  Entitlements file not found at $ENTITLEMENTS"
          fi

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --remove-xcarchive

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
